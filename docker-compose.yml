name: rssnews

services:
  rss-news-bot:
    build: .
    container_name: rss-news-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BOT_STATE_FILE=/app/data/bot_state.json
    volumes:
      - ./data:/app/data
    command: ["python", "-u", "bot.py"]

  rss-news-digest:
    build: .
    restart: "no"
    env_file:
      - .env
    environment:
      - BOT_STATE_FILE=/app/data/bot_state.json
    volumes:
      - ./data:/app/data
    command: ["python", "-u", "daily_source_digest.py", "--state-file", "/app/data/source_digest_state.json"]
